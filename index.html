<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>하늘에서 두쫀쿠가 떨어진다면.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>하늘에서 두쫀쿠가 떨어진다면.</h1>
    <div id="stats">
        점수: <span id="score">0</span> | 시간: <span id="time">0.0</span>초
    </div>

    <div id="game-board">
        <div id="player">🧺</div>
        <div id="start-screen">
            <h2>두쫀쿠(🥐)를 받아주세요!</h2>
            <p>하나라도 놓치면 실패!</p>
            <button id="start-btn">게임 시작</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
